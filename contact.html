<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Schedule Consultation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">hr1525906 LLK</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Get Started</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact">
        <div class="container">
            <h1>Schedule Your Free Consultation</h1>
            <p>Fill out the form below and we'll get back to you within 24 hours</p>

            <form id="contactForm" class="contact-form" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label for="company">Company Name</label>
                    <input type="text" id="company" name="company">
                </div>

                <div class="form-group">
                    <label for="platform">What platform are you using? *</label>
                    <select id="platform" name="platform" required>
                        <option value="">Select...</option>
                        <option value="Google Ads">Google Ads</option>
                        <option value="Bing Ads">Bing Ads</option>
                        <option value="Both">Both Google & Bing</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="budget">Monthly Ad Budget</label>
                    <select id="budget" name="budget">
                        <option value="">Select range...</option>
                        <option value="1000-5000">$1,000 - $5,000</option>
                        <option value="5000-10000">$5,000 - $10,000</option>
                        <option value="10000-50000">$10,000 - $50,000</option>
                        <option value="50000+">$50,000+</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Tell us about your challenges *</label>
                    <textarea id="message" name="message" rows="5" placeholder="What are your main pain points with PPC management?" required></textarea>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="privacy" name="privacy" required>
                    <label for="privacy">I agree to receive communications about PPC automation services</label>
                </div>

                <button type="submit" class="btn btn-primary btn-large">Schedule Consultation</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 hr1525906 LLK. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
